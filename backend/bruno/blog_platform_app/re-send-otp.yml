info:
  name: re-send-otp
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/otp/resend-otp"
  params:
    - name: Authorization
      value: Bearer {{token}}
      type: query
      disabled: true
  body:
    type: json
    data: |-
      {
        "token" :"{{token}}"
      }

runtime:
  variables:
    - name: token
      value: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
