info:
  name: verify-reset-password-token
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{base_url}}/api/auth/reset/update/password/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "otp": "{{otp}}",
        "password": "password@P123",
        "token": "{{token}}"
      }
  auth:
    type: basic

runtime:
  scripts:
