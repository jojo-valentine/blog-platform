info:
  name: verify-reset-password-token
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/api/auth/verify-reset-token?token={{token}}"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: token
      value: "{{token}}"
      type: query
  body:
    type: json
    data: |-
      {
        "token": "{{token}}"
      }
  auth:
    type: basic

runtime:
  scripts:
    - type: after-response
      code: |-
        // bru.setVar("token", res.body.token);
        // bru.setVar("userId", res.body.user.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
