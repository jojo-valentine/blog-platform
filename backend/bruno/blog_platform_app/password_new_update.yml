info:
  name: password_new_update
  type: http
  seq: 12

http:
  method: PATCH
  url: "{{base_url}}/api/auth/update-password"
  headers:
    - name: Cookie
      value: accessToken={{jwt_token}}
  body:
    type: json
    data: |-
      {
        "password": "{{oldpassword}}",         // รหัสผ่านเดิม
        "newPassword": "{{newPassword}}",       // รหัสผ่านใหม่
        "confirmNewPassword": "{{confirmNewPassword}}"  // ยืนยันรหัสผ่านใหม่
      }
  auth: inherit

runtime:
  variables:
    - name: password_old
      value: password@P123
    - name: password_new
      value: pass@P123
    - name: password_confirm
      value: pass@P123

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
