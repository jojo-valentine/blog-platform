info:
  name: reset-password
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/auth/reset/password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email" :"{{email}}"
      }
  auth: inherit

runtime:
  variables:
    - name: email
      value: jojolala@gmail.com
  scripts:
    - type: before-request
      code: |-
        req.setBody({
           "email" :"{{email}}"
        })
    - type: after-response
      code: |-
        bru.setVar("token", res.body.token);
        bru.setVar("otp", res.body.otp);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
