info:
  name: admin_user_changePassword
  type: http
  seq: 44

http:
  method: PATCH
  url: "{{base_url}}/api/admin/users/{{id}}/changePassword"
  headers:
    - name: Cookie
      value: accessToken={{jwt_token}}
    - name: Content-Type
      value: multipart/form-data
      disabled: true
  body:
    type: json
    data: |-
      {
        "password": "{{password}}",
        "confirm_password":"{{confirm_password}}"
      }
  auth: inherit

runtime:
  variables:
    - name: id
      value: 6a1f2d2f62b69b02b2b2ca60
    - name: password
      value: password@P123
    - name: confirm_password
      value: password@P123

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
