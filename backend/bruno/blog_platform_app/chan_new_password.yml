info:
  name: chan_new_password
  type: http
  seq: 15

http:
  method: PUT
  url: "{{base_url}}/api/auth/confirm-change-email"
  headers:
    - name: Cookie
      value: accessToken={{jwt_token}}; changeEmailToken={{token}}
  body:
    type: json
    data: |-
      {
        "otp" : "{{EmailOtp}}"
      }
  auth: inherit

runtime:
  variables:
    - name: EmailOtp
      value: "145043"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
